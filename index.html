function G({ children }) {

}
function Card({ children, style={}, onClick }) {
  const [h,sH]=useState(false);
  return <div onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} onClick={onClick} style={{ background:C.card, borderRadius:16, padding:24, boxShadow:h?"0 16px 48px rgba(108,60,225,.1)":"0 2px 12px rgba(0,0,0,.04)", border:"1px solid #EEEDF5", transition:"all .3s", transform:h&&onClick?"translateY(-3px)":"none", cursor:onClick?"pointer":"default", ...style }}>{children}</div>;
}
function Sec({ children, bg=C.light }) {
  return <section style={{ padding:"clamp(48px,8vw,80px) clamp(16px,4vw,24px)", background:bg }}><div style={{ maxWidth:1100, margin:"0 auto" }}>{children}</div></section>;
}
function ST({ pre, title, sub }) {
  return <div style={{ textAlign:"center", marginBottom:40 }}>
    {pre && <div style={{ fontSize:32, marginBottom:8 }}>{pre}</div>}
    <h2 style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:"clamp(26px,4vw,36px)", fontWeight:800, color:C.dark, margin:"0 0 8px" }}><G>{title}</G></h2>
    {sub && <p style={{ fontFamily:"'DM Sans',sans-serif", color:C.muted, fontSize:15, maxWidth:550, margin:"0 auto" }}>{sub}</p>}
  </div>;
}
function SocIcon({ icon, label }) {

}

// ============ LISTENING LAB ============
function Lab() {
  const [lv,sLv]=useState("All");
  const [act,sAct]=useState(null);
  const [ans,sAns]=useState({});
  const [sub,sSub]=useState(false);
  const [play,sPlay]=useState(false);
  const [prog,sProg]=useState(0);
  const [tk,sTk]=useState({});
  const [showTk,sShowTk]=useState(false);
  const ref=useRef(null);

  const filt=lv==="All"?exercises:exercises.filter(e=>e.level===lv);
  const doPlay=()=>{if(play){clearInterval(ref.current);sPlay(false)}else{sPlay(true);ref.current=setInterval(()=>sProg(p=>{if(p>=100){clearInterval(ref.current);sPlay(false);return 100}return p+.5}),100)}};
  const start=ex=>{sAct(ex);sAns({});sSub(false);sPlay(false);sProg(0);clearInterval(ref.current)};
  const sc=()=>{if(!act)return 0;let c=0;act.qs.forEach((q,i)=>{if(ans[i]===q.a)c++});return c};
  const doSub=()=>{sSub(true);const s=sc();const t=act.qs.length;sTk(p=>({...p,[act.id]:{s,t,pct:Math.round(s/t*100),d:new Date().toLocaleDateString()}}))};

  // TRACKER
  if(showTk){
    const done=Object.keys(tk).length;const avg=done>0?Math.round(Object.values(tk).reduce((a,b)=>a+b.pct,0)/done):0;
    return <Sec bg={`linear-gradient(180deg,#F0ECFF,${C.light})`}>
      <button onClick={()=>sShowTk(false)} style={{ background:"none", border:"none", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.pri, fontWeight:600, marginBottom:16 }}>← Back</button>
      <ST pre="📊" title="My Progress" sub="Track your listening practice performance"/>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:12, marginBottom:28 }}>
        {[{n:`${done}/${exercises.length}`,l:"Completed",i:"✅",c:C.acc},{n:`${avg}%`,l:"Avg Score",i:"📈",c:C.pri},{n:Object.values(tk).filter(t=>t.pct===100).length+"",l:"Perfect",i:"🌟",c:C.hi},{n:Object.values(tk).filter(t=>t.pct<60).length+"",l:"Needs Review",i:"🔄",c:C.sec}].map((s,i)=>
          <Card key={i} style={{ textAlign:"center", padding:16 }}>
            <div style={{ fontSize:24, marginBottom:4 }}>{s.i}</div>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26, fontWeight:800, color:s.c }}>{s.n}</div>
            <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:.8 }}>{s.l}</div>
          </Card>)}
      </div>
      {["Beginner","Intermediate","Advanced"].map(l=>{
        const le=exercises.filter(e=>e.level===l);
        return <div key={l} style={{ marginBottom:20 }}>
          <h3 style={{ fontFamily:"'DM Sans',sans-serif", fontSize:15, fontWeight:700, color:C.dark, margin:"0 0 10px", display:"flex", alignItems:"center", gap:6 }}><span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:lCol[l] }}/>{l} ({le.filter(e=>tk[e.id]).length}/{le.length})</h3>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:8 }}>
            {le.map(ex=>{const t=tk[ex.id];return <div key={ex.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", borderRadius:10, background:C.card, border:`1px solid ${t?t.pct===100?C.acc+"40":t.pct>=60?C.hi+"40":C.sec+"40":"#EEE"}`, fontSize:12, fontFamily:"'DM Sans',sans-serif" }}>
              <div style={{ width:32, height:32, borderRadius:8, background:t?`${t.pct>=60?C.acc:C.sec}18`:"#F5F5F5", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0 }}>{t?t.pct===100?"🌟":"✅":"⬜"}</div>
              <div style={{ flex:1, minWidth:0 }}><div style={{ fontWeight:600, color:C.dark, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{ex.title}</div><div style={{ color:C.muted, fontSize:10 }}>{t?`${t.s}/${t.t} (${t.pct}%)`:"Not attempted"}</div></div>
            </div>})}
          </div>
        </div>})}
    </Sec>;
  }

  // ACTIVE EXERCISE
  if(act) return <Sec bg={`linear-gradient(180deg,#F0ECFF,${C.light})`}>
    <button onClick={()=>sAct(null)} style={{ background:"none", border:"none", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.pri, fontWeight:600, marginBottom:16 }}>← Back</button>
    <Card style={{ marginBottom:18, background:`linear-gradient(135deg,${C.dark},#2A1A5E)`, border:"none" }}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:6 }}><Badge color={lCol[act.level]}>{act.level}</Badge><Badge color="#FFF">{act.cat}</Badge></div>
      <h3 style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(20px,3vw,26px)", color:"#FFF", margin:"6px 0" }}>🎧 {act.title}</h3>
      <p style={{ fontFamily:"'DM Sans',sans-serif", color:"#B8B8D0", fontSize:13, margin:"0 0 16px" }}>{act.desc}</p>
      <div style={{ background:"rgba(255,255,255,.08)", borderRadius:12, padding:"12px 16px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <button onClick={doPlay} style={{ width:42, height:42, borderRadius:"50%", border:"none", cursor:"pointer", background:`linear-gradient(135deg,${C.pri},${C.sec})`, color:"#FFF", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{play?"⏸":"▶"}</button>
          <div style={{ flex:1 }}>
            <div style={{ height:5, background:"rgba(255,255,255,.1)", borderRadius:10, overflow:"hidden" }}><div style={{ width:`${prog}%`, height:"100%", borderRadius:10, background:`linear-gradient(90deg,${C.pri},${C.sec})`, transition:"width .1s" }}/></div>
            <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}><span style={{ fontSize:10, color:"#8888AA" }}>{Math.floor(prog/100*150)}s</span><span style={{ fontSize:10, color:"#8888AA" }}>{act.dur}</span></div>
          </div>
        </div>
        <p style={{ fontSize:10, color:C.hi, margin:"8px 0 0", fontStyle:"italic" }}>⚡ Demo — real audio plays in the full version</p>
      </div>
    </Card>
    <h3 style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:700, color:C.dark, margin:"0 0 14px" }}>Comprehension Questions</h3>
    {act.qs.map((q,qi)=>
      <Card key={qi} style={{ marginBottom:10, borderLeft:`4px solid ${sub?(ans[qi]===q.a?C.acc:ans[qi]!==undefined?C.err:C.muted):C.pri}` }}>
        <p style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, fontWeight:700, color:C.dark, margin:"0 0 10px" }}>{qi+1}. {q.q}</p>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {q.o.map((op,oi)=>{
            const sel=ans[qi]===oi, ok=q.a===oi;
            let bg=sel?`${C.pri}12`:"#FAFAFA", bc=sel?C.pri:"#EEE";
            if(sub&&ok){bg=`${C.acc}15`;bc=C.acc}if(sub&&sel&&!ok){bg="#FDE8E8";bc=C.err}
            return <label key={oi} style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 12px", borderRadius:10, border:`2px solid ${bc}`, background:bg, cursor:sub?"default":"pointer", transition:"all .2s", fontFamily:"'DM Sans',sans-serif", fontSize:13 }}>
              <input type="radio" name={`q${qi}`} disabled={sub} checked={sel} onChange={()=>sAns(p=>({...p,[qi]:oi}))} style={{ accentColor:C.pri }}/><span style={{ flex:1 }}>{op}</span>{sub&&ok&&<span>✅</span>}{sub&&sel&&!ok&&<span>❌</span>}
            </label>})}
        </div>
      </Card>
    )}
    {!sub?<button onClick={doSub} disabled={Object.keys(ans).length<act.qs.length} style={{ width:"100%", padding:"13px", borderRadius:12, border:"none", cursor:"pointer", background:Object.keys(ans).length<act.qs.length?"#DDD":`linear-gradient(135deg,${C.pri},${C.sec})`, color:"#FFF", fontFamily:"'DM Sans',sans-serif", fontSize:14, fontWeight:700 }}>Submit Answers</button>
    :<Card style={{ background:`linear-gradient(135deg,${C.acc}12,${C.pri}06)`, border:`2px solid ${C.acc}30`, textAlign:"center" }}>
      <div style={{ fontSize:40, marginBottom:4 }}>{sc()===act.qs.length?"🎉":sc()>=act.qs.length*.6?"👍":"💪"}</div>
      <h3 style={{ fontFamily:"'Playfair Display',serif", fontSize:24, color:C.dark, margin:"0 0 4px" }}>Score: {sc()}/{act.qs.length}</h3>
      <p style={{ fontFamily:"'DM Sans',sans-serif", color:C.muted, margin:"0 0 14px", fontSize:13 }}>{sc()===act.qs.length?"Perfect!":sc()>=act.qs.length*.6?"Good job!":"Keep practicing!"}</p>
      <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap" }}>
        <button onClick={()=>start(act)} style={{ padding:"9px 20px", borderRadius:50, border:"none", cursor:"pointer", background:`linear-gradient(135deg,${C.pri},${C.sec})`, color:"#FFF", fontSize:12, fontWeight:600 }}>Try Again</button>
        <button onClick={()=>sAct(null)} style={{ padding:"9px 20px", borderRadius:50, border:`2px solid ${C.pri}`, background:"transparent", color:C.pri, fontSize:12, fontWeight:600, cursor:"pointer" }}>Back</button>
      </div>
    </Card>}
  </Sec>;

  // LIST
  return <Sec bg={`linear-gradient(180deg,#F0ECFF,${C.light})`}>
    <ST pre="🎧" title="Listening Lab" sub="Practice listening skills with 30 interactive exercises at every level"/>
    <div style={{ textAlign:"center", marginBottom:20 }}>
      <button onClick={()=>sShowTk(true)} style={{ padding:"9px 20px", borderRadius:50, border:`2px solid ${C.pri}`, background:`${C.pri}08`, color:C.pri, fontSize:12, fontWeight:600, cursor:"pointer" }}>📊 My Progress ({Object.keys(tk).length}/{exercises.length})</button>
    </div>
    <div style={{ display:"flex", justifyContent:"center", gap:6, marginBottom:28, flexWrap:"wrap" }}>
      {["All","Beginner","Intermediate","Advanced"].map(l=><button key={l} onClick={()=>sLv(l)} style={{ padding:"8px 20px", borderRadius:50, border:"none", cursor:"pointer", background:lv===l?`linear-gradient(135deg,${C.pri},${C.sec})`:"#FFF", color:lv===l?"#FFF":C.text, fontSize:13, fontWeight:600, boxShadow:lv===l?`0 4px 20px ${C.pri}30`:"0 2px 8px rgba(0,0,0,.04)", transition:"all .3s" }}>{l}{l!=="All"&&` (${exercises.filter(e=>e.level===l).length})`}</button>)}
    </div>
    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))", gap:14 }}>
      {filt.map(ex=>{const t=tk[ex.id];return <Card key={ex.id} onClick={()=>start(ex)} style={{ position:"relative", overflow:"hidden" }}>
        {t&&<div style={{ position:"absolute", top:10, right:10, width:28, height:28, borderRadius:"50%", background:t.pct===100?C.acc:t.pct>=60?C.hi:C.sec, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:"#FFF", fontWeight:700 }}>{t.pct===100?"★":t.pct+"%"}</div>}
        <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}><Badge color={lCol[ex.level]}>{ex.level}</Badge><Badge color={C.muted}>{ex.cat}</Badge></div>
        <h4 style={{ fontFamily:"'DM Sans',sans-serif", fontSize:15, fontWeight:700, color:C.dark, margin:"0 0 4px" }}>{ex.title}</h4>
        <p style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11, color:C.muted, margin:"0 0 12px", lineHeight:1.5 }}>{ex.desc}</p>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontSize:11, color:C.muted }}>🕐 {ex.dur} • 📝 {ex.qs.length}Q</span>
          <span style={{ padding:"4px 10px", borderRadius:50, fontSize:10, fontWeight:700, background:`linear-gradient(135deg,${C.pri},${C.sec})`, color:"#FFF" }}>START →</span>
        </div>
      </Card>})}
    </div>
  </Sec>;
}

// ============ BLOG ============

  const filt=cat==="All"?blogPosts:blogPosts.filter(p=>p.cat===cat);

  if(act) return <Sec bg="#FFF">
    <button onClick={()=>sAct(null)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:13, color:C.pri, fontWeight:600, marginBottom:16 }}>← Back</button>
    <article style={{ maxWidth:700, margin:"0 auto" }}>
      <Badge color={catCol[act.cat]||C.pri}>{act.cat}</Badge>
      <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(22px,4vw,34px)", fontWeight:800, color:C.dark, lineHeight:1.3, margin:"10px 0" }}>{act.title}</h1>
      <div style={{ display:"flex", gap:14, fontSize:12, color:C.muted, marginBottom:28, flexWrap:"wrap" }}>
        <span>📅 {act.date}</span><span>⏱️ {act.time} read</span><span>✍️ Hasan Ayuba, M.Pd.</span>

      <div style={{ background:`linear-gradient(135deg,${C.pri}08,${C.sec}08)`, borderRadius:14, height:200, display:"flex", alignItems:"center", justifyContent:"center", marginBottom:28 }}><span style={{ fontSize:56 }}>📝</span></div>
      <div style={{ fontSize:14, color:C.text, lineHeight:1.8 }}>
        <p>{act.excerpt}</p>
        <p style={{ color:C.muted, fontStyle:"italic", padding:20, borderLeft:`4px solid ${C.pri}`, background:`${C.pri}06`, borderRadius:"0 10px 10px 0", margin:"20px 0" }}>This is a preview. Your full article content would appear here with rich formatting, images, and embedded media.</p>

  return <Sec bg="#FFF">
    <ST pre="✍️" title="Blog & Articles" sub="Insights on English teaching, learning strategies, and research"/>
    <div style={{ display:"flex", justifyContent:"center", gap:6, marginBottom:28, flexWrap:"wrap" }}>
      {cats.map(c=><button key={c} onClick={()=>sCat(c)} style={{ padding:"7px 16px", borderRadius:50, border:"none", cursor:"pointer", background:cat===c?C.dark:"#F5F3FF", color:cat===c?"#FFF":C.text, fontSize:12, fontWeight:600, transition:"all .3s" }}>{c}</button>)}
    </div>
    {cat==="All"&&<div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))", gap:14, marginBottom:28 }}>
      {blogPosts.filter(p=>p.feat).map(p=><Card key={p.id} onClick={()=>sAct(p)} style={{ background:`linear-gradient(135deg,${C.dark},#2A1A5E)`, border:"none" }}>
        <Badge color={C.hi}>Featured</Badge>
        <h3 style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:800, color:"#FFF", margin:"10px 0 6px", lineHeight:1.3 }}>{p.title}</h3>
        <p style={{ fontSize:12, color:"#B8B8D0", lineHeight:1.6, margin:"0 0 12px" }}>{p.excerpt.substring(0,120)}...</p>
        <div style={{ display:"flex", justifyContent:"space-between" }}><span style={{ fontSize:11, color:"#8888AA" }}>{p.date} • {p.time}</span><span style={{ fontSize:11, color:C.acc, fontWeight:600 }}>Read →</span></div>
      </Card>)}
    </div>}
    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
      {filt.map(p=><Card key={p.id} onClick={()=>sAct(p)} style={{ display:"flex", gap:14, flexWrap:"wrap", alignItems:"center" }}>
        <div style={{ width:48, height:48, borderRadius:12, background:`${catCol[p.cat]||C.pri}12`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{catIco[p.cat]||"📝"}</div>
        <div style={{ flex:1, minWidth:180 }}>
          <Badge color={catCol[p.cat]||C.pri}>{p.cat}</Badge>
          <h4 style={{ fontSize:14, fontWeight:700, color:C.dark, margin:"4px 0 2px" }}>{p.title}</h4>
          <span style={{ fontSize:11, color:C.muted }}>{p.date} • {p.time} read</span>
        </div>
        <span style={{ fontSize:12, color:C.pri, fontWeight:600 }}>Read →</span>
      </Card>)}
    </div>
  </Sec>;
}

// ============ APP ============
function App() {
  const [pg,sPg]=useState("Home");
  const [sc,sSc]=useState(false);
  const [mo,sMo]=useState(false);
  useEffect(()=>{const fn=()=>sSc(window.scrollY>50);window.addEventListener("scroll",fn);return()=>window.removeEventListener("scroll",fn)},[]);
  useEffect(()=>{window.scrollTo({top:0,behavior:"smooth"})},[pg]);

  return <div style={{ fontFamily:"'DM Sans',sans-serif", background:C.light, minHeight:"100vh" }}>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:100, padding:sc?"8px 16px":"12px 16px", background:sc?"rgba(15,15,26,.95)":"transparent", backdropFilter:sc?"blur(20px)":"none", transition:"all .4s", borderBottom:sc?"1px solid rgba(255,255,255,.06)":"none" }}>

        <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:18, fontWeight:800, color:"#FFF", cursor:"pointer" }} onClick={()=>{sPg("Home");sMo(false)}}><G>H. Ayuba</G></div>
        <button className="mob-btn" onClick={()=>sMo(!mo)} style={{ display:"none", background:"none", border:"none", color:"#FFF", fontSize:22, cursor:"pointer" }}>{mo?"✕":"☰"}</button>
        <div className="desk-nav" style={{ display:"flex", gap:4 }}>
          {PAGES.map(p=><button key={p} onClick={()=>{sPg(p);sMo(false)}} style={{ padding:"6px 14px", borderRadius:50, border:"none", cursor:"pointer", background:pg===p?"rgba(108,60,225,.2)":"transparent", color:pg===p?"#FFF":"#AAAACC", fontSize:12, fontWeight:500, transition:"all .3s" }}>{p}</button>)}
        </div>
      </div>
      {mo&&<div className="mob-nav" style={{ display:"none", flexDirection:"column", gap:2, padding:"8px 16px", background:"rgba(15,15,26,.98)", borderTop:"1px solid rgba(255,255,255,.06)" }}>
        {PAGES.map(p=><button key={p} onClick={()=>{sPg(p);sMo(false)}} style={{ padding:"10px 14px", borderRadius:10, border:"none", cursor:"pointer", background:pg===p?"rgba(108,60,225,.2)":"transparent", color:pg===p?"#FFF":"#AAAACC", fontSize:14, fontWeight:500, textAlign:"left" }}>{p}</button>)}
      </div>}
    </nav>

    {pg==="Home"&&<><Hero setPage={sPg}/><Pubs/></>}
    {pg==="About"&&<div style={{ paddingTop:60 }}><About/></div>}
    {pg==="Listening Lab"&&<div style={{ paddingTop:60 }}><Lab/></div>}
    {pg==="Blog"&&<div style={{ paddingTop:60 }}><Blog/></div>}
    {pg==="Resources"&&<div style={{ paddingTop:60 }}><Res/></div>}
    {pg==="Contact"&&<div style={{ paddingTop:60 }}><Contact/></div>}

    <footer style={{ padding:"16px", textAlign:"center", background:C.darker, borderTop:"1px solid rgba(255,255,255,.05)" }}>
      <div style={{ display:"flex", justifyContent:"center", gap:8, marginBottom:8 }}>
        <SocIcon icon="🎓" label="Scholar"/><SocIcon icon="📊" label="SINTA"/><SocIcon icon="🆔" label="ORCID"/><SocIcon icon="📘" label="ResearchGate"/><SocIcon icon="💼" label="LinkedIn"/>
      </div>
      <p style={{ fontSize:11, color:"#666680", margin:0 }}>© 2026 Hasan Ayuba, M.Pd. — IAIN Sultan Amai Gorontalo. Department of English Language Education.</p>
    </footer>
  </div>;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
